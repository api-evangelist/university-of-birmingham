  - date: '2026-06-03'
    rating: 2
    summary: >-
      No central developer portal or published API program was found. Verified
      live machine-readable interfaces are limited to the EPrints repository
      OAI-PMH endpoints (eData, eTheses, ePapers) and a small open English
      Constructicon research API, all returning HTTP 200 and requiring no
      authentication. Library discovery runs on Ex Libris Primo (FindIt@Bham)
      but exposes no documented public API. The institutional GitHub org exists
      but has no public repositories. No endpoints were fabricated; all listed
      URLs were probed.
