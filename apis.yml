aid: university-of-birmingham
name: University of Birmingham
description: >-
  The University of Birmingham is a public research university in Birmingham,
  United Kingdom, and a founding member of the Russell Group, ranked #94 in the
  QS World University Rankings 2025. Its public developer/API footprint is
  limited and decentralized: there is no central developer portal or published
  API program. Confirmed machine-readable interfaces are concentrated in the
  library/research-repository ecosystem (EPrints-based repositories exposing
  OAI-PMH endpoints) plus a small open research API from the English
  Constructicon linguistics project. The institutional GitHub organization
  exists but currently exposes no public repositories.
